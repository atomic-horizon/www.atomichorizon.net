baseURL: https://www.atomichorizon.net/
languageCode: en-us
title: Atomic Horizon
theme: PaperMod
sectionPagesMenu: main
copyright: © Atomic Horizon LLC
params:
  env: production
  description: "Atomic Horizon is a game studio building experiences and tools on the Roblox platform."
  author:
    name: Atomic Horizon
  hideAuthor: true
  defaultTheme: dark
  disableThemeToggle: true
  label:
    text: "Atomic Horizon"
    icon: images/logo.png
    iconHeight: 32
    iconWidth: 32
  ShowShareButtons: false
  displayFullLangName: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  images:
    - images/logo.png
  profileMode:
    enabled: true
    title: " "
    imageUrl: images/logo.png
    imageTitle: Atomic Horizon Logo
    imageWidth: 140
    imageHeight: 140
    buttons:
      - name: Our Projects
        url: projects
      - name: About Us
        url: about
  homeInfoParams:
    Title: ""
    Content: "\n"
  socialIcons:
    - name: github
      title: View our team on Github
      url: https://github.com/atomic-horizon
    - name: Discord
      title: Join the Discord community for Combat Arena
      url: https://discord.gg/5D2BEuwKdr
    - name: X
      title: Follow us on X/Twitter
      url: https://x.com/PlayCombatArena
  assets:
    favicon: "/static/favicon.ico"
    disableHLJS: true
    theme_color: "#f97316"
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
services:
  x:
    disableInlineCSS: true
